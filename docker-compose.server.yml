# Production override — joins ninja-shared network for Caddy routing via WireGuard
# Usage: docker compose -f docker-compose.yml -f docker-compose.server.yml up -d

services:
  api:
    mem_limit: 3g
    environment:
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - API_KEY=${API_KEY:?Set API_KEY in .env}
      - CORS_ALLOW_ORIGINS=https://ninja.ing
      - DEFAULT_MODEL=depth-anything-v2
    ports:
      - "10.0.0.2:4025:18025"
    networks:
      - default
      - ninja-shared

networks:
  default:
  ninja-shared:
    external: true
